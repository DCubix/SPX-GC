services:
  spx-gc:
    build: .
    image: spx-gc:latest
    container_name: spx-gc
    restart: unless-stopped
    ports:
      - "5656:5656"
      - "57121:57121/udp"
    volumes:
      - spx-dataroot:/app/DATAROOT
      # Bind-mount ASSETS to a host directory so that the host's existing
      # Samba (or any other file-sharing service) can expose it directly.
      # Set ASSETS_PATH in .env — see .env.example for details.
      - ${ASSETS_PATH:?Set ASSETS_PATH in .env before running}:/app/ASSETS
      - spx-log:/app/LOG

volumes:
  spx-dataroot:
  spx-log:
